name: "📚 Documentation Builder"

on:
  push:
    branches: [master]
    paths:
      - 'docs/**/*'
      - '.github/workflows/docs_builder.yml'
      - 'qgispluginci/**/*.py'
      - pyproject.toml
    tags:
      - "*"

  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/docs_builder.yml"
      - docs/**/*
      - pyproject.toml

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.14

jobs:
  build-docs:

    runs-on: ubuntu-latest

    steps:
    - name: Get source code
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: "pip"
        cache-dependency-path: pyproject.toml

    - name: Install project as a package
      run: python -m pip install -e .

    - name: Generates dependencies graph page with pipdetree
      run: |
        python -m pip install pipdeptree
        echo -e "\`\`\`{mermaid}" > docs/misc/_dependencies.md
        pipdeptree --exclude pip,pipdeptree,setuptools,wheel --extras -o mermaid >> docs/misc/_dependencies.md
        echo -e "\`\`\`" >> docs/misc/_dependencies.md

    # this job must run before installing other dependencies to avoid listing everything
    - name: Generates licenses page with pip-licences
      run: |
        python -m pip install pip-licenses
        pip-licenses --format=markdown --with-authors --with-description --with-urls --ignore-packages qgis-plugin-ci --output-file=docs/misc/_licenses.md

    - name: Install documentation requirements
      run: python -m pip install -U -e .[doc]

    - name: Build doc using Sphinx
      run: sphinx-build -b html -j auto -d docs/_build/cache -q docs docs/_build/html

    - name: Save build doc as artifact
      uses: actions/upload-artifact@v7
      with:
        name: documentation
        path: docs/_build/html/*
        if-no-files-found: error
        retention-days: 30

    - name: Setup Pages
      uses: actions/configure-pages@v6
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta')

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta')
      with:
        # Upload entire repository
        path: docs/_build/html/

    - name: Deploy to GitHub Pages
      id: deployment
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta')
      uses: actions/deploy-pages@v5
